name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
  workflow_dispatch:

# Least-privilege token for deploying to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deployment; cancel older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Astro check
        working-directory: site
        run: npx astro check

      # `npm run build` (NOT `npx astro build`) so the `prebuild` lifecycle hook
      # fires `npm run build-data`, generating site/public/data/* from the
      # committed data/curated/*.csv and data/geo/*.geojson inputs before the
      # static build. Those generated artifacts are git-ignored. npx bypasses
      # npm lifecycle hooks, so the data dir would be missing on the live site.
      - name: Build site
        working-directory: site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
